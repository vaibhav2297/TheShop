name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - dev
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - dev

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor app
        run: dotnet publish ./src/TheShop.Web/TheShop.Web.csproj -c Release -o ./publish

      - name: Inspect published output
        run: |
          echo "=== Does published wwwroot/index.html exist? ==="
          ls -la ./publish/wwwroot/index.html || echo "MISSING index.html"
          echo "=== Full publish/wwwroot root listing ==="
          ls -la ./publish/wwwroot
          echo "=== _framework listing (blazor boot files) ==="
          ls -la ./publish/wwwroot/_framework | head -40
          echo "=== Script reference in published index.html ==="
          grep -n "blazor.webassembly" ./publish/wwwroot/index.html || echo "NO script match"

      - name: Use staging SWA config
        run: cp ./src/TheShop.Web/wwwroot/staticwebapp.dev.config.json ./src/TheShop.Web/wwwroot/staticwebapp.config.json
      
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_PLANT_01481EE10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          app_location: "./publish/wwwroot" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "" # Built app content directory - optional
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_PLANT_01481EE10 }}
          action: "close"
